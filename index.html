<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>올 A+ 러너 — 임승현의 글로벌 비즈니스 챌린지</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #0d1021;
    color: #eaeaea;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    touch-action: none;
  }
  #wrap { position: relative; }
  canvas {
    display: block;
    border-radius: 16px;
    box-shadow: 0 10px 60px rgba(79,172,254,0.25);
    background: #141a33;
    touch-action: none;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>

<script>
'use strict';

// ===== 기본 설정 =====
const W = 520, H = 700;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// 화면 크기에 맞춰 스케일
function fit() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H) * 0.97;
  canvas.width = W; canvas.height = H;
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
fit();
window.addEventListener('resize', fit);

// ===== 게임 데이터 =====
const SEMESTERS = [
  { name: '1학년 1학기', course: '경영학원론',          time: 30, speed: 3.0, spawn: 0.60, badRatio: 0.30 },
  { name: '1학년 2학기', course: '비즈니스 영어',        time: 32, speed: 3.4, spawn: 0.55, badRatio: 0.34 },
  { name: '2학년 1학기', course: '국제마케팅',          time: 34, speed: 3.8, spawn: 0.50, badRatio: 0.38 },
  { name: '2학년 2학기', course: '국제무역실무',         time: 36, speed: 4.2, spawn: 0.46, badRatio: 0.42 },
  { name: '3학년 1학기', course: '글로벌 재무관리',       time: 38, speed: 4.6, spawn: 0.42, badRatio: 0.46 },
  { name: '3학년 2학기', course: '국제협상론',          time: 40, speed: 5.0, spawn: 0.38, badRatio: 0.50 },
  { name: '4학년 1학기', course: '글로벌 전략경영',       time: 42, speed: 5.5, spawn: 0.34, badRatio: 0.54 },
  { name: '4학년 2학기', course: '글로벌 비즈니스 캡스톤', time: 45, speed: 6.0, spawn: 0.30, badRatio: 0.58 },
];

const INTRO_LINES = [
  '"대학은 처음이라... 일단 전공책부터 받자!"',
  '"Global business? Piece of cake... 아마도?"',
  '"4P가 뭐더라... Product, Price, 폰, 피자?"',
  '"FOB? CIF? 무역용어가 외계어 같다..."',
  '"환율이 오르면... 내 통장은 왜 늘 그대로지?"',
  '"협상의 기본은 포커페이스. (표정 관리 실패)"',
  '"이제 진짜 4학년... 물러설 곳이 없다!"',
  '"마지막 학기. 전설이 되느냐, 재수강이냐!"',
];

const RIVAL_LINES = [
  '시현: "네가 임승현? 올 A+가 목표라며. 나도야."',
  '시현: "영어 발표 수업? 여기선 내가 홈그라운드지."',
  '시현: "지난 학기는 운이 좋았을 뿐이야."',
  '시현: "무역용어 정리본? 너한텐 안 보여줄 건데~"',
  '시현: "환율 계산 속도는 내가 한 수 위야."',
  '시현: "협상은 심리전. 네 표정, 다 읽혀."',
  '시현: "벌써 4학년이네. 끝까지 가보자."',
  '시현: "마지막 학기... 나도 전력으로 간다!"',
];

// 아이템 정의
const GOOD_ITEMS = [
  { emoji: '📖', score: 8,  label: '+8' },
  { emoji: '📝', score: 8,  label: '+8' },
  { emoji: '📚', score: 12, label: '+12' },
  { emoji: '🌏', score: 16, label: '글로벌 인사이트 +16', rare: 0.12 },
  { emoji: '💼', score: 10, label: '+10' },
];
const BAD_ITEMS = [
  { emoji: '📱', score: -10, label: '숏폼의 유혹 -10' },
  { emoji: '🎮', score: -10, label: '겜 한판만... -10' },
  { emoji: '🍺', score: -14, label: '술자리 -14', stun: true },
  { emoji: '💤', score: -8,  label: '수면부족 -8' },
];
const HEART_ITEM = { emoji: '❤️', label: '멘탈 회복!' };
const COFFEE_ITEM = { emoji: '☕', label: '카페인 부스트!' };

const APLUS = 80;
const MAX_HEARTS = 3;

// ===== 상태 =====
let scene = 'title';   // title | intro | play | result | gameover | clear
let semIdx = 0;
let retries = 2;       // 재수강 기회
let grades = [];

const player = { x: W / 2, y: H - 90, w: 74, h: 74, vx: 0, face: 1, stun: 0, boost: 0 };
const rival = { x: W / 4, y: H - 90, face: 1, stun: 0, score: 0, moving: false };
let playerWins = 0, rivalWins = 0, lastRivalScore = 0;
let items = [];        // 떨어지는 것들
let floats = [];       // 떠오르는 텍스트
let particles = [];
let knowledge = 0, hearts = MAX_HEARTS, combo = 0, maxCombo = 0;
let timeLeft = 0, spawnTimer = 0, shake = 0, finalsWeek = false;
let sceneTimer = 0;    // intro/result 연출용
let lastGradeScore = 0;

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Enter') advance();
  if ([' ', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key] = false);

// 터치/마우스: 드래그로 이동, 탭으로 화면 전환
let pointerX = null;
function toGameX(clientX) {
  const r = canvas.getBoundingClientRect();
  return (clientX - r.left) / r.width * W;
}
canvas.addEventListener('pointerdown', e => { pointerX = toGameX(e.clientX); advance(); });
canvas.addEventListener('pointermove', e => { if (e.buttons || e.pointerType === 'touch') pointerX = toGameX(e.clientX); });
canvas.addEventListener('pointerup', () => pointerX = null);

function advance() {
  if (scene === 'title') { semIdx = 0; retries = 2; grades = []; playerWins = 0; rivalWins = 0; startIntro(); }
  else if (scene === 'intro' && sceneTimer > 0.6) startPlay();
  else if (scene === 'result' && sceneTimer > 1.2) {
    semIdx++;
    if (semIdx >= SEMESTERS.length) scene = 'clear';
    else startIntro();
  }
  else if (scene === 'gameover' && sceneTimer > 1.0) { scene = 'title'; }
  else if (scene === 'clear') { scene = 'title'; }
}

function startIntro() { scene = 'intro'; sceneTimer = 0; failFlash = ''; }

function startPlay() {
  const s = SEMESTERS[semIdx];
  scene = 'play';
  knowledge = 0; hearts = MAX_HEARTS; combo = 0; maxCombo = 0;
  timeLeft = s.time; spawnTimer = 0; finalsWeek = false;
  items = []; floats = []; particles = [];
  player.x = W / 2; player.stun = 0; player.boost = 0;
  rival.x = W / 4; rival.stun = 0; rival.score = 0; rival.face = 1;
}

// ===== 스폰 =====
function spawnItem() {
  const s = SEMESTERS[semIdx];
  const r = Math.random();
  let def, kind;
  if (r < 0.03) { def = HEART_ITEM; kind = 'heart'; }
  else if (r < 0.08) { def = COFFEE_ITEM; kind = 'coffee'; }
  else if (r < 0.08 + s.badRatio) { def = BAD_ITEMS[(Math.random() * BAD_ITEMS.length) | 0]; kind = 'bad'; }
  else {
    // 희귀템 확률 처리
    if (Math.random() < 0.12) def = GOOD_ITEMS[3];
    else def = GOOD_ITEMS[[0,1,2,4][(Math.random()*4)|0]];
    kind = 'good';
  }
  const golden = finalsWeek && kind === 'good';
  items.push({
    x: 40 + Math.random() * (W - 80),
    y: -30,
    vy: s.speed * (0.85 + Math.random() * 0.5) * (golden ? 1.25 : 1),
    wobble: semIdx >= 1 ? Math.random() * Math.PI * 2 : null, // 1학년 2학기부터 지그재그
    wobbleAmp: 1.5 + Math.random() * 2,
    def, kind, golden,
  });
}

function addFloat(x, y, text, color) {
  floats.push({ x, y, text, color, life: 1 });
}
function burst(x, y, color, n = 10) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1, life: 1, color });
  }
}

// ===== 업데이트 =====
let last = performance.now();
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  sceneTimer += dt;
  if (scene === 'play') updatePlay(dt);
  floats.forEach(f => { f.y -= 40 * dt; f.life -= dt * 0.9; });
  floats = floats.filter(f => f.life > 0);
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= dt * 1.6; });
  particles = particles.filter(p => p.life > 0);
  if (shake > 0) shake -= dt * 30;
  draw();
  requestAnimationFrame(loop);
}

function updatePlay(dt) {
  const s = SEMESTERS[semIdx];

  // 이동
  const stunned = player.stun > 0;
  if (player.stun > 0) player.stun -= dt;
  if (player.boost > 0) player.boost -= dt;
  const speed = (stunned ? 120 : 330) * (player.boost > 0 ? 1.5 : 1);

  let dir = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) dir -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dir += 1;
  if (pointerX !== null) {
    const diff = pointerX - player.x;
    if (Math.abs(diff) > 8) dir = Math.sign(diff);
  }
  if (dir !== 0) player.face = dir;
  player.moving = dir !== 0;
  player.x += dir * speed * dt;
  player.x = Math.max(40, Math.min(W - 40, player.x));

  // 라이벌 김시현 AI: 가장 가까운 좋은 아이템을 쫓는다
  if (rival.stun > 0) rival.stun -= dt;
  let target = null, bestD = Infinity;
  for (const it of items) {
    if (it.kind === 'bad') continue;
    const d = Math.abs(it.x - rival.x) + (H - it.y) * 0.8;
    if (d < bestD) { bestD = d; target = it; }
  }
  let rdir = 0;
  if (target && Math.abs(target.x - rival.x) > 6) rdir = Math.sign(target.x - rival.x);
  rival.moving = rdir !== 0;
  if (rdir !== 0) rival.face = rdir;
  rival.x += rdir * (rival.stun > 0 ? 90 : 255) * dt;
  rival.x = Math.max(40, Math.min(W - 40, rival.x));

  // 타이머
  timeLeft -= dt;
  if (!finalsWeek && timeLeft <= 10) {
    finalsWeek = true;
    addFloat(W / 2, H / 2 - 60, '🔔 기말고사 주간! 황금 아이템 2배!', '#ffd369');
  }
  if (timeLeft <= 0) { endSemester(); return; }

  // 스폰
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnItem();
    if (finalsWeek && Math.random() < 0.5) spawnItem();
    spawnTimer = s.spawn * 0.85 * (finalsWeek ? 0.6 : 1); // 시현과 경쟁하는 만큼 아이템 보충
  }

  // 아이템 이동/충돌
  for (const it of items) {
    it.y += it.vy;
    if (it.wobble !== null) { it.wobble += dt * 4; it.x += Math.sin(it.wobble) * it.wobbleAmp; }

    const dx = Math.abs(it.x - player.x), dy = Math.abs(it.y - (player.y - 10));
    if (dx < 44 && dy < 46 && !it.hit) {
      it.hit = true;
      handleCatch(it);
    }
    if (!it.hit) {
      const rdx = Math.abs(it.x - rival.x), rdy = Math.abs(it.y - (rival.y - 10));
      if (rdx < 38 && rdy < 42) { it.hit = true; rivalCatch(it); }
    }
  }
  items = items.filter(it => !it.hit && it.y < H + 40);
}

function handleCatch(it) {
  if (it.kind === 'good') {
    let sc = it.def.score * (it.golden ? 2 : 1);
    combo++;
    maxCombo = Math.max(maxCombo, combo);
    if (combo > 0 && combo % 5 === 0) {
      sc += 5;
      addFloat(player.x, player.y - 90, `🔥 ${combo} 콤보! +5`, '#ff9f43');
    }
    knowledge = Math.min(100, knowledge + sc);
    addFloat(it.x, it.y, (it.golden ? '✨' : '') + '+' + sc, it.golden ? '#ffd369' : '#7ee787');
    burst(it.x, it.y, it.golden ? '#ffd369' : '#4facfe', it.golden ? 16 : 8);
  } else if (it.kind === 'bad') {
    knowledge = Math.max(0, knowledge + it.def.score);
    hearts--;
    combo = 0;
    shake = 10;
    if (it.def.stun) { player.stun = 1.0; }
    addFloat(it.x, it.y, it.def.label, '#ff8a8a');
    burst(it.x, it.y, '#e94560', 12);
    if (hearts <= 0) { failSemester('번아웃으로 쓰러졌다... 😵'); }
  } else if (it.kind === 'heart') {
    if (hearts < MAX_HEARTS) { hearts++; addFloat(it.x, it.y, HEART_ITEM.label, '#ff6b9d'); }
    else { knowledge = Math.min(100, knowledge + 5); addFloat(it.x, it.y, '멘탈 충만 +5', '#ff6b9d'); }
    burst(it.x, it.y, '#ff6b9d', 10);
  } else if (it.kind === 'coffee') {
    player.boost = 4;
    addFloat(it.x, it.y, COFFEE_ITEM.label, '#c9a86a');
    burst(it.x, it.y, '#c9a86a', 8);
  }
}

function rivalCatch(it) {
  if (it.kind === 'good') {
    const sc = it.def.score * (it.golden ? 2 : 1);
    rival.score = Math.min(100, rival.score + sc);
    addFloat(it.x, it.y, '시현 +' + sc, '#ff9ec4');
    burst(it.x, it.y, '#ff9ec4', 6);
  } else if (it.kind === 'bad') {
    rival.score = Math.max(0, rival.score + it.def.score);
    rival.stun = 1.2;
    addFloat(it.x, it.y, '시현 멘붕!', '#ff9ec4');
  } else {
    rival.score = Math.min(100, rival.score + 3);
    addFloat(it.x, it.y, '시현 +3', '#ff9ec4');
  }
}

function endSemester() {
  lastGradeScore = knowledge;
  lastRivalScore = rival.score;
  if (knowledge >= APLUS) {
    grades.push('A+');
    if (knowledge >= rival.score) playerWins++; else rivalWins++;
    scene = 'result'; sceneTimer = 0;
  } else {
    failSemester(`지식 ${knowledge}점... A+ 커트라인(${APLUS})에 못 미쳤다.`);
  }
}

let failReason = '';
function failSemester(reason) {
  failReason = reason;
  if (retries > 0) {
    retries--;
    scene = 'intro'; sceneTimer = -1.2; // 재수강 안내 겸 인트로
    failFlash = reason;
  } else {
    scene = 'gameover'; sceneTimer = 0;
  }
}
let failFlash = '';

// ===== 그리기 =====
function draw() {
  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

  // 배경
  const g = ctx.createLinearGradient(0, 0, 0, H);
  if (scene === 'play' && finalsWeek) { g.addColorStop(0, '#2b1a3d'); g.addColorStop(1, '#4a2545'); }
  else { g.addColorStop(0, '#141a33'); g.addColorStop(1, '#1d2b53'); }
  ctx.fillStyle = g;
  ctx.fillRect(-20, -20, W + 40, H + 40);

  // 배경 장식 (강의실 창문 느낌)
  ctx.globalAlpha = 0.05;
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 5; i++) ctx.fillRect(30 + i * 100, 60, 60, 90);
  ctx.globalAlpha = 1;

  if (scene === 'title') drawTitle();
  else if (scene === 'intro') drawIntro();
  else if (scene === 'play') drawPlay();
  else if (scene === 'result') drawResult();
  else if (scene === 'gameover') drawGameover();
  else if (scene === 'clear') drawClear();

  // 파티클 & 플로팅 텍스트 (공통)
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
  }
  ctx.globalAlpha = 1;
  for (const f of floats) {
    ctx.globalAlpha = Math.max(0, f.life);
    ctx.fillStyle = f.color;
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;

  ctx.restore();
}

// 캐릭터 스타일 정의
const STYLE_SEUNGHYUN = {
  name: '임승현', tag: '#ffd369',
  hair: '#26262e', hairStyle: 'short',
  jacket: st.jacket, lapel: '#24397a',
  neck: 'tie', neckColor: '#e94560',
  pants: '#232a45', book: '#2e8b57', skirt: false,
};
const STYLE_SIHYUN = {
  name: '김시현', tag: '#ff9ec4',
  hair: '#3a262c', hairStyle: 'long',
  jacket: '#c2497a', lapel: '#973560',
  neck: 'ribbon', neckColor: '#ffd369',
  pants: '#973560', book: '#e8608a', skirt: true,
};
function drawCharacter(x, y, size, face, state) { drawPerson(x, y, size, face, state, STYLE_SEUNGHYUN); }
function drawRival(x, y, size, face, state) { drawPerson(x, y, size, face, state, STYLE_SIHYUN); }

// 공용 캐릭터 렌더러 (직접 그린 벡터 캐릭터)
// state: 'idle' | 'run' | 'stun' | 'happy'
function drawPerson(x, y, size, face, state, st) {
  const t = performance.now() / 1000;
  const s = size / 96;
  const moving = state === 'run';
  const stunned = state === 'stun';
  const happy = state === 'happy';

  ctx.save();
  ctx.translate(x, y + size / 2); // 발 기준 원점

  // 그림자
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(0, 2 * s, 24 * s, 5 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  if (face < 0) ctx.scale(-1, 1);
  const bob = moving ? -Math.abs(Math.sin(t * 11)) * 5 * s : Math.sin(t * 2.4) * 2 * s;
  ctx.translate(0, bob);
  if (stunned) ctx.rotate(Math.sin(t * 16) * 0.09);
  if (happy) ctx.translate(0, -Math.abs(Math.sin(t * 5)) * 9 * s); // 신나서 폴짝폴짝

  ctx.lineCap = 'round';

  // 다리 (달릴 때 스윙)
  const swing = moving ? Math.sin(t * 13) * 9 * s : 0;
  ctx.strokeStyle = st.skirt ? '#ffdcb8' : st.pants;
  ctx.lineWidth = st.skirt ? 6.5 * s : 9 * s;
  ctx.beginPath(); ctx.moveTo(-8 * s, -28 * s); ctx.lineTo(-8 * s + swing, -5 * s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8 * s, -28 * s); ctx.lineTo(8 * s - swing, -5 * s); ctx.stroke();
  // 구두
  ctx.fillStyle = st.skirt ? '#5a3040' : '#3d2f23';
  ctx.beginPath(); ctx.ellipse(-8 * s + swing + 3 * s, -4 * s, 7 * s, 4 * s, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8 * s - swing + 3 * s, -4 * s, 7 * s, 4 * s, 0, 0, Math.PI * 2); ctx.fill();

  // 치마
  if (st.skirt) {
    ctx.fillStyle = st.lapel;
    ctx.beginPath();
    ctx.moveTo(-14 * s, -32 * s); ctx.lineTo(14 * s, -32 * s);
    ctx.lineTo(19 * s, -14 * s); ctx.lineTo(-19 * s, -14 * s);
    ctx.closePath(); ctx.fill();
  }

  // 뒤쪽 팔
  const armSwing = moving ? Math.sin(t * 13) * 9 * s : Math.sin(t * 2.4) * 2 * s;
  ctx.strokeStyle = st.jacket;
  ctx.lineWidth = 8 * s;
  ctx.beginPath(); ctx.moveTo(-15 * s, -52 * s); ctx.lineTo(-22 * s - armSwing * 0.4, -36 * s + armSwing); ctx.stroke();
  ctx.fillStyle = '#ffdcb8';
  ctx.beginPath(); ctx.arc(-22 * s - armSwing * 0.4, -36 * s + armSwing, 4.5 * s, 0, Math.PI * 2); ctx.fill();

  // 몸통: 네이비 블레이저
  ctx.fillStyle = st.jacket;
  roundRect(-19 * s, -60 * s, 38 * s, 36 * s, 10 * s); ctx.fill();
  // 셔츠 + 넥타이
  ctx.fillStyle = '#f5f5f5';
  ctx.beginPath(); ctx.moveTo(-8 * s, -60 * s); ctx.lineTo(8 * s, -60 * s); ctx.lineTo(0, -43 * s); ctx.closePath(); ctx.fill();
  if (st.neck === 'tie') {
    ctx.fillStyle = st.neckColor;
    ctx.beginPath();
    ctx.moveTo(-3 * s, -58 * s); ctx.lineTo(3 * s, -58 * s); ctx.lineTo(4 * s, -48 * s);
    ctx.lineTo(0, -43 * s); ctx.lineTo(-4 * s, -48 * s);
    ctx.closePath(); ctx.fill();
  } else {
    // 리본
    ctx.fillStyle = st.neckColor;
    ctx.beginPath();
    ctx.moveTo(0, -56 * s); ctx.lineTo(-8 * s, -60 * s); ctx.lineTo(-8 * s, -52 * s); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, -56 * s); ctx.lineTo(8 * s, -60 * s); ctx.lineTo(8 * s, -52 * s); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -56 * s, 2.2 * s, 0, Math.PI * 2); ctx.fill();
  }
  // 라펠 라인
  ctx.strokeStyle = st.lapel;
  ctx.lineWidth = 2 * s;
  ctx.beginPath(); ctx.moveTo(-8 * s, -60 * s); ctx.lineTo(-6 * s, -48 * s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8 * s, -60 * s); ctx.lineTo(6 * s, -48 * s); ctx.stroke();

  // 앞쪽 팔: 전공책을 들고 있다
  ctx.strokeStyle = st.jacket;
  ctx.lineWidth = 8 * s;
  ctx.beginPath(); ctx.moveTo(15 * s, -52 * s); ctx.lineTo(24 * s, -62 * s - armSwing * 0.5); ctx.stroke();
  // 전공책
  ctx.save();
  ctx.translate(26 * s, -68 * s - armSwing * 0.5);
  ctx.rotate(-0.25);
  ctx.fillStyle = st.book;
  roundRect(-9 * s, -12 * s, 18 * s, 24 * s, 2 * s); ctx.fill();
  ctx.fillStyle = '#ffd369';
  ctx.fillRect(-9 * s, -4 * s, 18 * s, 3 * s);
  ctx.restore();
  // 손
  ctx.fillStyle = '#ffdcb8';
  ctx.beginPath(); ctx.arc(24 * s, -62 * s - armSwing * 0.5, 4.5 * s, 0, Math.PI * 2); ctx.fill();

  // ===== 머리 =====
  const hy = -80 * s;
  // 뒷머리 (긴 머리 스타일)
  if (st.hairStyle === 'long') {
    ctx.fillStyle = st.hair;
    roundRect(-24 * s, hy - 22 * s, 48 * s, 52 * s, 16 * s);
    ctx.fill();
  }
  ctx.fillStyle = '#ffdcb8';
  if (st.hairStyle === 'short') {
    // 귀
    ctx.beginPath(); ctx.arc(-20 * s, hy + 2 * s, 4.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(20 * s, hy + 2 * s, 4.5 * s, 0, Math.PI * 2); ctx.fill();
  }
  // 얼굴
  ctx.beginPath(); ctx.arc(0, hy, 21 * s, 0, Math.PI * 2); ctx.fill();
  // 머리카락 (앞머리 뱅 스타일)
  ctx.fillStyle = st.hair;
  ctx.beginPath();
  ctx.arc(0, hy, 21.5 * s, Math.PI * 0.98, Math.PI * 2.02);
  ctx.lineTo(21.5 * s, hy - 4 * s);
  ctx.quadraticCurveTo(14 * s, hy - 12 * s, 8 * s, hy - 7 * s);
  ctx.quadraticCurveTo(2 * s, hy - 13 * s, -5 * s, hy - 8 * s);
  ctx.quadraticCurveTo(-13 * s, hy - 13 * s, -21.5 * s, hy - 4 * s);
  ctx.closePath();
  ctx.fill();
  if (st.hairStyle === 'short') {
    // 옆머리
    ctx.fillRect(-22 * s, hy - 6 * s, 5 * s, 12 * s);
    ctx.fillRect(17 * s, hy - 6 * s, 5 * s, 12 * s);
    // 삐친 머리 한 가닥
    ctx.strokeStyle = st.hair;
    ctx.lineWidth = 3 * s;
    ctx.beginPath(); ctx.moveTo(4 * s, hy - 21 * s); ctx.quadraticCurveTo(9 * s, hy - 30 * s, 14 * s, hy - 25 * s); ctx.stroke();
  } else {
    // 긴 옆머리 + 머리핀
    ctx.fillRect(-24 * s, hy - 6 * s, 6 * s, 26 * s);
    ctx.fillRect(18 * s, hy - 6 * s, 6 * s, 26 * s);
    ctx.strokeStyle = '#ffd369';
    ctx.lineWidth = 2 * s;
    ctx.beginPath(); ctx.moveTo(11 * s, hy - 13 * s); ctx.lineTo(17 * s, hy - 9 * s); ctx.stroke();
  }

  const ey = hy + 3 * s;

  // 눈 (상태별 표정 + 깜빡임)
  const blink = !stunned && !happy && (t % 3.2) < 0.13;
  ctx.strokeStyle = '#26262e';
  ctx.fillStyle = '#26262e';
  if (stunned) {
    ctx.lineWidth = 2 * s;
    for (const ex of [-8.5 * s, 8.5 * s]) {
      ctx.beginPath();
      ctx.moveTo(ex - 3 * s, ey - 3 * s); ctx.lineTo(ex + 3 * s, ey + 3 * s);
      ctx.moveTo(ex + 3 * s, ey - 3 * s); ctx.lineTo(ex - 3 * s, ey + 3 * s);
      ctx.stroke();
    }
  } else if (happy) {
    ctx.lineWidth = 2.2 * s;
    for (const ex of [-8.5 * s, 8.5 * s]) {
      ctx.beginPath(); ctx.arc(ex, ey + 1.5 * s, 3.5 * s, Math.PI * 1.15, Math.PI * 1.85); ctx.stroke();
    }
  } else if (blink) {
    ctx.lineWidth = 2 * s;
    for (const ex of [-8.5 * s, 8.5 * s]) {
      ctx.beginPath(); ctx.moveTo(ex - 3 * s, ey); ctx.lineTo(ex + 3 * s, ey); ctx.stroke();
    }
  } else {
    for (const ex of [-8.5 * s, 8.5 * s]) {
      ctx.beginPath(); ctx.arc(ex, ey, 2.8 * s, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(ex + 1 * s, ey - 1 * s, 0.9 * s, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#26262e';
    }
  }

  // 눈썹
  ctx.lineWidth = 2 * s;
  ctx.strokeStyle = '#26262e';
  const browLift = stunned ? -3 * s : (moving ? -1.5 * s : 0);
  ctx.beginPath(); ctx.moveTo(-12 * s, ey - 8 * s + browLift); ctx.lineTo(-5 * s, ey - 9 * s + browLift); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5 * s, ey - 9 * s + browLift); ctx.lineTo(12 * s, ey - 8 * s + browLift); ctx.stroke();

  // 볼터치
  if (happy) {
    ctx.fillStyle = 'rgba(255,120,140,0.45)';
    ctx.beginPath(); ctx.ellipse(-13 * s, ey + 6 * s, 3.5 * s, 2 * s, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(13 * s, ey + 6 * s, 3.5 * s, 2 * s, 0, 0, Math.PI * 2); ctx.fill();
  }

  // 입
  ctx.strokeStyle = '#a4553f';
  ctx.lineWidth = 2 * s;
  if (stunned) {
    ctx.beginPath(); ctx.arc(0, ey + 10 * s, 2.5 * s, 0, Math.PI * 2); ctx.stroke();
  } else if (happy) {
    ctx.fillStyle = '#a4553f';
    ctx.beginPath(); ctx.arc(0, ey + 8 * s, 4.5 * s, 0, Math.PI); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(0, ey + 8 * s, 3.5 * s, Math.PI * 0.15, Math.PI * 0.85); ctx.stroke();
  }

  ctx.restore();

  // 이름표
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  const nw = 74;
  roundRect(x - nw / 2, y + size * 0.55, nw, 22, 11);
  ctx.fill();
  ctx.fillStyle = st.tag;
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(st.name, x, y + size * 0.55 + 11);
  if (stunned) {
    ctx.font = '20px sans-serif';
    ctx.fillText('💫', x, y - size * 0.7);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function centerText(text, y, font, color) {
  ctx.font = font;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, W / 2, y);
}

function drawTitle() {
  centerText('🎓', 130, '80px sans-serif', '#fff');
  centerText('올 A+ 러너', 220, 'bold 44px sans-serif', '#ffd369');
  centerText('임승현의 글로벌 비즈니스 챌린지', 262, '17px sans-serif', '#9ab');

  drawCharacter(W / 2 - 80, 372, 84, 1, 'idle');
  drawRival(W / 2 + 80, 372, 80, -1, 'idle');
  centerText('임승현 vs 김시현 — 글로벌 비즈니스학과 성적 라이벌!', 462, '14px sans-serif', '#8fa');

  const y = 520;
  centerText('📖📚🌏 지식을 받아 A+ (80점)를 노려라!', y, '15px sans-serif', '#cde');
  centerText('📱🎮🍺 유혹에 닿으면 멘탈이 깎인다!', y + 28, '15px sans-serif', '#fbb');
  centerText('❤️ 멘탈 3개 · 재수강 기회 2번', y + 56, '15px sans-serif', '#ffb3c6');

  if (Math.sin(performance.now() / 300) > -0.3)
    centerText('▶ 탭 또는 스페이스로 입학하기', 640, 'bold 18px sans-serif', '#fff');
  centerText('이동: ← → 키 / A·D / 터치 드래그', 672, '12px sans-serif', '#789');
}

function drawIntro() {
  const s = SEMESTERS[semIdx];

  if (failFlash && sceneTimer < 0.0) {
    // 재수강 안내 페이즈
    centerText('💥 ' + failFlash, 250, 'bold 18px sans-serif', '#ff8a8a');
    centerText('재수강 기회를 사용한다!', 300, 'bold 24px sans-serif', '#ffd369');
    centerText(`남은 재수강 기회: ${retries}번`, 345, '16px sans-serif', '#cde');
    return;
  }

  centerText(s.name, 180, 'bold 36px sans-serif', '#ffd369');
  centerText('수강 과목', 240, '14px sans-serif', '#789');
  centerText('『 ' + s.course + ' 』', 275, 'bold 26px sans-serif', '#4facfe');

  drawCharacter(W / 2 - 78, 385, 74, 1, 'idle');
  drawRival(W / 2 + 78, 385, 74, -1, 'idle');
  centerText(INTRO_LINES[semIdx], 478, '14px sans-serif', '#cde');
  centerText(RIVAL_LINES[semIdx], 502, '14px sans-serif', '#ff9ec4');

  centerText(`⏱ ${s.time}초 안에 지식 ${APLUS}점 이상 = A+`, 540, '15px sans-serif', '#8fa');
  if (failFlash) centerText(`(재수강 중... 남은 기회 ${retries}번)`, 570, '13px sans-serif', '#f99');

  if (sceneTimer > 0.6 && Math.sin(performance.now() / 300) > -0.3)
    centerText('▶ 탭 또는 스페이스로 개강', 630, 'bold 18px sans-serif', '#fff');
}

function drawPlay() {
  const s = SEMESTERS[semIdx];

  // 아이템
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const it of items) {
    if (it.golden) {
      ctx.shadowColor = '#ffd369';
      ctx.shadowBlur = 18;
    }
    ctx.font = (it.golden ? 40 : 34) + 'px sans-serif';
    ctx.fillText(it.def.emoji, it.x, it.y);
    ctx.shadowBlur = 0;
  }

  // 라이벌 김시현 (플레이어보다 뒤에 그린다)
  const rState = rival.stun > 0 ? 'stun' : (rival.moving ? 'run' : 'idle');
  drawRival(rival.x, rival.y, 58, rival.face, rState);

  // 임승현
  const pState = player.stun > 0 ? 'stun' : (player.moving ? 'run' : 'idle');
  drawCharacter(player.x, player.y, 64, player.face, pState);
  if (player.boost > 0) {
    ctx.font = '18px sans-serif';
    ctx.fillText('⚡', player.x - 40, player.y - 20);
  }

  // ===== HUD =====
  // 상단 바
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  roundRect(12, 12, W - 24, 92, 12);
  ctx.fill();

  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffd369';
  ctx.font = 'bold 15px sans-serif';
  ctx.fillText(`${s.name} · ${s.course}`, 26, 34);

  // 타이머
  ctx.textAlign = 'right';
  ctx.fillStyle = timeLeft <= 10 ? '#ff8a8a' : '#fff';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText('⏱ ' + Math.ceil(timeLeft) + 's', W - 26, 36);

  // 지식 게이지
  const bx = 26, by = 52, bw = W - 52, bh = 18;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  roundRect(bx, by, bw, bh, 9); ctx.fill();
  const ratio = knowledge / 100;
  const bg = ctx.createLinearGradient(bx, 0, bx + bw, 0);
  bg.addColorStop(0, '#4facfe'); bg.addColorStop(1, '#00f2fe');
  ctx.fillStyle = knowledge >= APLUS ? '#ffd369' : null;
  ctx.fillStyle = knowledge >= APLUS ? '#ffd369' : bg;
  if (ratio > 0) { roundRect(bx, by, Math.max(bw * ratio, bh), bh, 9); ctx.fill(); }
  // A+ 커트라인 표시
  const cutX = bx + bw * (APLUS / 100);
  ctx.strokeStyle = '#ffd369';
  ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(cutX, by - 3); ctx.lineTo(cutX, by + bh + 3); ctx.stroke();
  ctx.setLineDash([]);

  ctx.textAlign = 'left';
  ctx.fillStyle = '#cde';
  ctx.font = 'bold 13px sans-serif';
  ctx.fillText(`🧠 지식 ${knowledge}`, bx, by + bh + 16);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff9ec4';
  ctx.fillText(`💗 시현 ${rival.score}`, W / 2, by + bh + 16);
  ctx.textAlign = 'right';
  ctx.fillStyle = knowledge >= APLUS ? '#ffd369' : '#789';
  ctx.fillText(knowledge >= APLUS ? '✨ A+ 확보! 유지하라!' : `A+ 커트라인 ${APLUS}`, bx + bw, by + bh + 16);

  // 멘탈 하트
  ctx.textAlign = 'left';
  ctx.font = '20px sans-serif';
  let hs = '';
  for (let i = 0; i < MAX_HEARTS; i++) hs += i < hearts ? '❤️' : '🖤';
  ctx.fillText(hs, 26, 130);

  // 콤보
  if (combo >= 3) {
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ff9f43';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText(`🔥 ${combo} COMBO`, W - 26, 130);
  }

  // 기말고사 주간 배너
  if (finalsWeek && Math.sin(performance.now() / 200) > 0) {
    centerText('🔔 기말고사 주간 🔔', 165, 'bold 20px sans-serif', '#ffd369');
  }
}

function drawResult() {
  const s = SEMESTERS[semIdx];
  centerText(s.name + ' 성적 발표', 160, 'bold 24px sans-serif', '#cde');
  centerText('『 ' + s.course + ' 』', 200, '17px sans-serif', '#789');

  // A+ 도장 쾅!
  const t = Math.min(sceneTimer / 0.5, 1);
  const sc = 3 - 2 * t;
  ctx.save();
  ctx.translate(W / 2, 330);
  ctx.scale(sc, sc);
  ctx.rotate(-0.12);
  ctx.globalAlpha = t;
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 6;
  roundRectAt(-90, -55, 180, 110, 14);
  ctx.stroke();
  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 72px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('A+', 0, 4);
  ctx.restore();
  if (t >= 1 && sceneTimer < 0.55) { shake = 12; burst(W / 2, 330, '#ffd369', 24); }

  centerText(`최종 지식 ${lastGradeScore}점 · 최대 콤보 ${maxCombo}`, 435, '15px sans-serif', '#8fa');
  const beat = lastGradeScore >= lastRivalScore;
  centerText(
    beat ? `시현 ${lastRivalScore}점 — "어떻게 매번 나를 이겨...?"`
         : `시현 ${lastRivalScore}점 — "후후, 이번 학기는 내가 위네?"`,
    463, '14px sans-serif', '#ff9ec4');

  // 성적표 진행
  drawTranscript(500);

  if (sceneTimer > 1.2 && Math.sin(performance.now() / 300) > -0.3) {
    const next = semIdx + 1 < SEMESTERS.length ? '다음 학기로' : '졸업식으로';
    centerText('▶ 탭 또는 스페이스로 ' + next, 630, 'bold 18px sans-serif', '#fff');
  }
}

function roundRectAt(x, y, w, h, r) { roundRect(x, y, w, h, r); }

function drawTranscript(y) {
  const cw = 112, ch = 28, gap = 8, perRow = 4;
  const startX = W / 2 - (perRow * cw + (perRow - 1) * gap) / 2;
  for (let i = 0; i < SEMESTERS.length; i++) {
    const x = startX + (i % perRow) * (cw + gap);
    const yy = y + ((i / perRow) | 0) * (ch + gap);
    const done = i < grades.length;
    ctx.fillStyle = done ? '#ffd369' : 'rgba(255,255,255,0.1)';
    roundRect(x, yy, cw, ch, 8); ctx.fill();
    ctx.fillStyle = done ? '#1a1a2e' : '#678';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(SEMESTERS[i].name + (done ? ' · A+' : ''), x + cw / 2, yy + ch / 2);
  }
}

function drawGameover() {
  centerText('💀', 170, '70px sans-serif', '#fff');
  centerText('학사 경고...', 250, 'bold 34px sans-serif', '#e94560');
  centerText(failReason, 300, '15px sans-serif', '#fbb');
  centerText('재수강 기회도 모두 소진됐다.', 330, '15px sans-serif', '#cde');
  centerText('올 A+ 신화는 다음 기회에...', 360, '15px sans-serif', '#cde');

  drawTranscript(420);

  centerText('💡 팁: 유혹은 피하고, 기말고사 주간의', 500, '13px sans-serif', '#9ab');
  centerText('황금 아이템(2배)을 노려보세요!', 522, '13px sans-serif', '#9ab');
  centerText('시현: "...같이 졸업하기로 했잖아. 다시 일어나."', 556, '14px sans-serif', '#ff9ec4');

  if (sceneTimer > 1.0 && Math.sin(performance.now() / 300) > -0.3)
    centerText('▶ 탭 또는 스페이스로 재도전', 630, 'bold 18px sans-serif', '#fff');
}

function drawClear() {
  // 색종이
  if (Math.random() < 0.3) {
    particles.push({
      x: Math.random() * W, y: -10,
      vx: (Math.random() - 0.5) * 2, vy: 2 + Math.random() * 2,
      life: 3, color: ['#ffd369', '#4facfe', '#e94560', '#7ee787', '#ff6b9d'][(Math.random() * 5) | 0],
    });
  }

  centerText('🏆', 140, '70px sans-serif', '#fff');
  centerText('전설의 수석 졸업!', 225, 'bold 38px sans-serif', '#ffd369');
  centerText('8학기 전 과목 올 A+ 달성', 270, '17px sans-serif', '#cde');

  drawCharacter(W / 2 - 70, 372, 78, 1, 'happy');
  drawRival(W / 2 + 74, 372, 74, -1, 'happy');
  centerText('글로벌 비즈니스학과 수석 졸업생', 458, 'bold 15px sans-serif', '#8fa');
  centerText(`시현과의 성적 대결 전적: ${playerWins}승 ${rivalWins}패`, 482, '13px sans-serif', '#ff9ec4');

  centerText('졸업식 날, 글로벌 기업 10곳의 스카우트 제안!', 512, '14px sans-serif', '#cde');
  centerText('시현: "인정할게. 너 진짜 대단했어."', 536, '14px sans-serif', '#ff9ec4');
  centerText('"임승현 씨, 우리 회사로 오시죠!"', 560, 'bold 15px sans-serif', '#ffd369');

  drawTranscript(583);

  if (Math.sin(performance.now() / 300) > -0.3)
    centerText('▶ 탭 또는 스페이스로 처음으로', 668, 'bold 16px sans-serif', '#fff');
}

requestAnimationFrame(loop);
</script>
